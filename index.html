<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kejohanan Sukan Antarabangsa – Keputusan Rasmi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      color: #1e293b;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header dengan butang admin */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      background: white;
      padding: 1rem 2rem;
      border-radius: 40px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
    }

    .title-section h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
    }

    .title-section p {
      color: #475569;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .admin-btn {
      background: #f1f5f9;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #0f172a;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .admin-btn:hover {
      background: #e2e8f0;
      transform: translateY(-1px);
    }

    /* Tab navigasi */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #cbd5e1;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.75rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 40px 40px 0 0;
      position: relative;
    }

    .tab-btn.active {
      color: #2a5298;
      background: rgba(42,82,152,0.08);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #2a5298;
      border-radius: 3px 3px 0 0;
    }

    /* Kandungan tab */
    .tab-pane {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-pane.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Jadual */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      background: #0f172a;
      color: white;
      padding: 1rem 1rem;
      font-weight: 600;
      text-align: center;
    }

    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
    }

    tr:hover {
      background: #f8fafc;
    }

    /* Kad acara */
    .acara-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .acara-card {
      background: white;
      border-radius: 20px;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .acara-card i {
      font-size: 1.8rem;
      color: #2a5298;
    }

    .acara-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1);
      border-color: #cbd5e1;
    }

    .acara-card .info {
      flex: 1;
    }

    .acara-card .info strong {
      display: block;
      font-size: 1rem;
    }

    .acara-card .info small {
      color: #64748b;
      font-size: 0.8rem;
    }

    /* Modal login */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 28px;
      width: 350px;
      text-align: center;
      box-shadow: 0 25px 40px -12px black;
      position: relative;
    }

    .modal-content input {
      width: 100%;
      padding: 12px 35px 12px 15px;
      margin: 20px 0 10px 0;
      border: 1px solid #cbd5e1;
      border-radius: 50px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-pwd {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #64748b;
    }

    .modal-content button {
      background: #2a5298;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 1.8rem;
      cursor: pointer;
      color: #94a3b8;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: #475569;
      font-size: 0.8rem;
    }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .header { flex-direction: column; gap: 1rem; text-align: center; }
      .tab-btn { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title-section">
      <h1><i class="fas fa-trophy"></i> Kejohanan Sukan Antarabangsa</h1>
      <p>Keputusan Rasmi & Jadual Pertandingan</p>
    </div>
    <button class="admin-btn" id="adminLoginBtn"><i class="fas fa-lock"></i> Pentadbir</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="schedule">📅 Jadual Kejohanan</button>
    <button class="tab-btn" data-tab="results">🏅 Keputusan Acara</button>
  </div>

  <!-- Tab Jadual -->
  <div id="schedule" class="tab-pane active">
    <div class="table-wrapper">
      <table id="scheduleTable">
        <thead>
          <tr><th>Hari</th><th>Masa</th><th>Acara</th><th>Kategori</th><th>Pusingan</th><th>Status</th></tr>
        </thead>
        <tbody id="scheduleBody">
          <tr><td colspan="6">Memuatkan jadual...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Tab Keputusan -->
  <div id="results" class="tab-pane">
    <div id="acaraContainer" class="acara-grid"></div>
    <div id="resultsDetail" style="margin-top: 2rem;"></div>
  </div>

  <footer>
    © 2025 Jawatankuasa Kejohanan | Data dikemaskini secara langsung
  </footer>
</div>

<!-- Modal Admin -->
<div id="adminModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <h3><i class="fas fa-key"></i> Akses Pentadbir</h3>
    <div class="password-wrapper">
      <input type="password" id="adminPassword" placeholder="Kata laluan">
      <i class="fas fa-eye toggle-pwd" id="togglePwdIcon" onclick="togglePasswordVisibility()"></i>
    </div>
    <button id="submitPassword">Log Masuk</button>
    <div id="loginError" style="color:red; margin-top:10px; font-size:0.8rem;"></div>
  </div>
</div>

<script>
  // ======================== SETTING ========================
  // GANTIKAN URL INI DENGAN WEB APP APPS SCRIPT ANDA (AKHIRI DENGAN /exec)
  const API_BASE = 'https://script.google.com/macros/s/AKfycbx9OU7okr4L2FGuuUJdA_zdHqAe5J0DJG_D34abJdVWuDxCKTAOP_61oW43fYrJD0rp/exec';

  // Fungsi panggil API (GET)
  async function fetchAPI(action, params = {}) {
    let url = `${API_BASE}?action=${action}`;
    for (let key in params) {
      if (params[key] !== undefined && params[key] !== null) {
        url += `&${key}=${encodeURIComponent(params[key])}`;
      }
    }
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data;
    } catch (err) {
      console.error(`API Error [${action}]:`, err);
      return { error: err.message };
    }
  }

  // ========== 1. JADUAL KEHANJURAN ==========
  async function loadSchedule() {
    const tbody = document.getElementById('scheduleBody');
    tbody.innerHTML = '<tr><td colspan="6">Memuatkan jadual...</td></tr>';
    const data = await fetchAPI('getJadualKejohanan');
    if (data.error) {
      tbody.innerHTML = `<tr><td colspan="6">Gagal memuat jadual: ${data.error}</td></tr>`;
      return;
    }
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6">Tiada jadual. Pastikan tab "Jadual" wujud dan berisi data.</td></tr>';
      return;
    }
    let html = '';
    data.forEach(row => {
      html += `<tr>
        <td>${row.hari || '-'}</td>
        <td>${row.masa || '-'}</td>
        <td>${row.acara || '-'}</td>
        <td>${row.kategori || '-'}</td>
        <td>${row.pusingan || '-'}</td>
        <td>${row.status || '-'}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
  }

  // ========== 2. KEPUTUSAN ACARA ==========
  async function loadAcaraList() {
    const container = document.getElementById('acaraContainer');
    container.innerHTML = '<p>Memuatkan senarai acara...</p>';
    const data = await fetchAPI('getAcaraDenganKeputusan');
    if (data.error) {
      container.innerHTML = `<p>Ralat: ${data.error}</p>`;
      return;
    }
    if (!data || data.length === 0) {
      container.innerHTML = '<p>Tiada keputusan acara buat masa ini.</p>';
      return;
    }
    container.innerHTML = '';
    data.forEach(acara => {
      const card = document.createElement('div');
      card.className = 'acara-card';
      card.innerHTML = `
        <i class="fas fa-running"></i>
        <div class="info">
          <strong>${escapeHtml(acara.nama)}</strong>
          <small>Klik untuk lihat keputusan</small>
        </div>
      `;
      card.onclick = () => showKeputusanAcara(acara.id, acara.nama);
      container.appendChild(card);
    });
  }

  async function showKeputusanAcara(acaraId, acaraNama) {
    const detailDiv = document.getElementById('resultsDetail');
    detailDiv.innerHTML = '<div class="table-wrapper"><p>Memuatkan...</p></div>';
    const results = await fetchAPI('getKeputusanAcara', { acaraId });
    if (results.error) {
      detailDiv.innerHTML = `<div class="table-wrapper"><p>Ralat: ${results.error}</p></div>`;
      return;
    }
    if (!results || results.length === 0) {
      detailDiv.innerHTML = `<div class="table-wrapper"><p>Tiada keputusan untuk ${escapeHtml(acaraNama)}</p></div>`;
      return;
    }
    let html = `<div class="table-wrapper">
      <h3 style="padding:1rem 1rem 0 1rem;">${escapeHtml(acaraNama)}</h3>
      <table>
        <thead><tr><th>Bil</th><th>No Bib</th><th>Nama</th><th>Pasukan</th><th>Masa/Jarak</th><th>Kedudukan</th><th>Pingat</th></tr></thead>
        <tbody>`;
    results.forEach((r, idx) => {
      html += `<tr>
        <td>${idx+1}</td>
        <td>${r.bib || '-'}</td>
        <td>${escapeHtml(r.nama || '-')}</td>
        <td>${escapeHtml(r.pasukan || '-')}</td>
        <td>${r.masa_jarak || '-'}</td>
        <td>${r.kedudukan || '-'}</td>
        <td>${r.pingat || '-'}</td>
      </tr>`;
    });
    html += `</tbody></table><div style="padding:1rem; text-align:center;"><button class="admin-btn" onclick="document.getElementById('resultsDetail').innerHTML=''">Tutup</button></div></div>`;
    detailDiv.innerHTML = html;
    detailDiv.scrollIntoView({ behavior: 'smooth' });
  }

  // ========== 3. ADMIN LOGIN (DENGAN IKON MATA) ==========
  const modal = document.getElementById('adminModal');
  const loginBtn = document.getElementById('adminLoginBtn');
  const closeModal = document.getElementById('closeModal');
  const submitPwd = document.getElementById('submitPassword');
  const pwdInput = document.getElementById('adminPassword');
  const loginErrorSpan = document.getElementById('loginError');

  loginBtn.onclick = () => { modal.style.display = 'flex'; };
  closeModal.onclick = () => { modal.style.display = 'none'; };
  window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

  function togglePasswordVisibility() {
    const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
    pwdInput.setAttribute('type', type);
    const icon = document.getElementById('togglePwdIcon');
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
  }

  submitPwd.onclick = async () => {
    const pwd = pwdInput.value.trim();
    if (!pwd) {
      loginErrorSpan.innerText = 'Sila masukkan kata laluan.';
      return;
    }
    const result = await fetchAPI('verifyAdminPassword', { password: pwd });
    if (result.success === true) {
      // Gantikan URL admin.html dengan pautan Vercel anda
      window.open('https://sport-int.vercel.app/admin.html', '_blank');
      modal.style.display = 'none';
      pwdInput.value = '';
      loginErrorSpan.innerText = '';
    } else {
      loginErrorSpan.innerText = 'Kata laluan salah.';
    }
  };

  // ========== 4. TAB SWITCH ==========
  const tabBtns = document.querySelectorAll('.tab-btn');
  const panes = document.querySelectorAll('.tab-pane');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const tabId = btn.getAttribute('data-tab');
      panes.forEach(pane => pane.classList.remove('active'));
      tabBtns.forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
      if (tabId === 'schedule') loadSchedule();
      if (tabId === 'results' && document.getElementById('acaraContainer').innerHTML === '') loadAcaraList();
    });
  });

  // ========== UTILITY ==========
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Mulakan muatan
  loadSchedule();
  loadAcaraList();
</script>
</body>
</html>
